<!DOCTYPE html>
<html>
<head>
    <title>DODGE GAME</title>
    <link rel="stylesheet" href="GameStyle.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Game UI -->
        <div id="gameUI">
            <div>Score: <span id="score">0</span></div>
            <div>🪙 <span id="gameCoins">0</span></div>
            <div id="levelBarContainer">
                <div id="levelBar"></div>
            </div>
            <div><span id="levelTag">LVL 1</span></div>
            <button id="pauseBtn">⏸️</button>
        </div>
        
        <!-- Menu Screen -->
        <div id="menuScreen" class="screen">
            <h1>DODGE</h1>
            <div class="stats">
                <div>🪙 <span id="menuCoins">0</span></div>
                <div>🏆 <span id="menuBest">0</span></div>
            </div>
            <div class="current-skin-display">
                <img id="previewSkin" src="GamePlayer.png" alt="skin">
            </div>
            <button id="startGameBtn">START GAME</button>
            <button id="openShopBtn">SHOP</button>
            <button id="openAuthorBtn">AUTHOR</button>
        </div>
        
        <!-- Shop Screen -->
        <div id="shopScreen" class="screen">
            <h2>SHOP</h2>
            <div>Your Coins: 🪙 <span id="shopCoins">0</span></div>
            <div class="skin-grid">
                <div class="skin-item">
                    <img src="GamePlayer.png" alt="Default">
                    <div>Default</div>
                    <div id="skin0"></div>
                </div>
                <div class="skin-item">
                    <img src="skin1.png" alt="Blue">
                    <div>Blue</div>
                    <div id="skin1"></div>
                </div>
                <div class="skin-item">
                    <img src="skin2.png" alt="Red">
                    <div>Red</div>
                    <div id="skin2"></div>
                </div>
                <div class="skin-item">
                    <img src="skin3.png" alt="Gold">
                    <div>Gold</div>
                    <div id="skin3"></div>
                </div>
                <div class="skin-item">
                    <img src="skin4.png" alt="Green">
                    <div>Green</div>
                    <div id="skin4"></div>
                </div>
                <div class="skin-item">
                    <img src="skin5.png" alt="Purple">
                    <div>Purple</div>
                    <div id="skin5"></div>
                </div>
            </div>
            <button class="back-btn" id="backFromShopBtn">BACK</button>
        </div>
        
        <!-- Author Screen -->
        <div id="authorScreen" class="screen">
            <h2>AUTHOR</h2>
            <div>Total Games: <span id="totalGames">0</span></div>
            <div>Total Earnings: 🪙 <span id="totalEarnings">0</span></div>
            <button class="back-btn" id="backFromAuthorBtn">BACK</button>
        </div>
        
        <!-- Instructions / Game Over -->
        <div id="instructions">
            <h2 id="title">DODGE</h2>
            <p id="desc">Use Arrows or Tap Sides to move</p>
        </div>
        
        <!-- Pause Menu -->
        <div id="pauseMenu">
            <h2>PAUSED</h2>
            <button id="resumeBtn">RESUME</button>
            <button id="quitToMenuBtn">QUIT</button>
        </div>
    </div>
    
    <script src="DodgeGame.js"></script>
</body>
</html>
